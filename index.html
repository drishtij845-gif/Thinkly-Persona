<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thinkly Persona Bot</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="header">
<h1>Thinkly Persona Bot 🌸</h1>
<p>Let's discover your communication personality</p>
</div>

<div class="chat-container" id="chat">

<div class="bot-message">
Hi there 🌸 I'm Thinkly Persona Bot. 
Let's discover your communication style.
</div>

</div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Type your answer...">
<button onclick="sendMessage()">Send</button>
</div>

<div class="progress">
<div id="progressBar"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
